<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>食品二维码溯源系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui, sans-serif;}
body{background:#f7f9fa;padding:20px;max-width:600px;margin:0 auto;}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.title{text-align:center;color:#1a73e8;margin-bottom:20px;font-size:22px;}
.search{display:flex;gap:8px;margin-bottom:20px;}
input{flex:1;padding:12px 14px;border:1px solid #ddd;border-radius:8px;font-size:16px;}
button{padding:12px 18px;background:#1a73e8;color:white;border:none;border-radius:8px;cursor:pointer;}
.label{font-size:14px;color:#666;margin-bottom:4px;}
.value{font-size:16px;color:#222;margin-bottom:10px;}
.logistics{padding-left:18px;line-height:1.6;}
.conclusion{color:#0d863f;font-weight:600;margin-top:10px;}
.empty{text-align:center;color:#888;padding:20px;}
</style>
</head>
<body>
<div class="card">
<h2 class="title">食品二维码溯源查询</h2>
<div class="search">
<input id="code" placeholder="请输入溯源ID/扫码" />
<button onclick="search()">查询</button>
</div>
</div>

<div id="result" class="card" style="display:none;"></div>

<script>
let productData = [];

// 从外部 products.json 读取数据（只读一次，不重复）
async function loadData() {
  try {
    const res = await fetch('./products.json');
    productData = await res.json();
  } catch (e) {
    console.error('加载数据失败', e);
  }
}

function search() {
  const code = document.getElementById('code').value.trim();
  const res = productData.find(item => item.id === code);
  const dom = document.getElementById('result');

  if (!res) {
    dom.innerHTML = '<div class="empty">未查询到该溯源信息</div>';
    dom.style.display = 'block';
    return;
  }

  let html = `
<div class="label">产品名称</div><div class="value">${res.name}</div>
<div class="label">溯源ID</div><div class="value">${res.id}</div>
<div class="label">批次号</div><div class="value">${res.batch}</div>
<div class="label">产地</div><div class="value">${res.origin}</div>
<div class="label">生产日期</div><div class="value">${res.date}</div>
<div class="label">保质期</div><div class="value">${res.shelfLife}</div>
<div class="label">生产单位</div><div class="value">${res.producer}</div>
<div class="label">检测结果</div><div class="value">${res.testResult}</div>
<div class="label">检测机构</div><div class="value">${res.testOrg}</div>
<div class="label">物流溯源</div>
<ul class="logistics">${res.logistics.map(i=>`<li>${i}</li>`).join('')}</ul>
<div class="conclusion">${res.conclusion}</div>
`;
  dom.innerHTML = html;
  dom.style.display = 'block';
}

loadData();
</script>
</body>
</html>
